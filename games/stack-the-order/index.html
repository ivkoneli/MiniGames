<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Stack the Order — MiniGames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; height: 100dvh; }
    body {
      background: #070810;
      margin: 0; padding: 0;
      width: 100vw; width: 100dvw;
      height: 100vh; height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }
    canvas { display: block; touch-action: none; }
    html[data-theme="light"] body { background: #f0f4ff; }
  </style>
  <script>(function(){var t=localStorage.getItem("mg-theme");if(t==="light")document.documentElement.setAttribute("data-theme","light");})()</script>
</head>
<body>
  <script type="module" src="/src/games/StackTheOrder/main.ts"></script>
</body>
