<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniGames — Interactive Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/MiniGames/assets/main-BPZc96jm.js"></script>
  <link rel="modulepreload" crossorigin href="/MiniGames/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/MiniGames/assets/main-DujVVRls.css">
</head>
<body>

  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="content">

    <header class="header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">MiniGames</span>
      </div>
      <p class="tagline">Learning, but make it addicting.</p>
    </header>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="statGameTypes">8</div>
        <div class="stat-label">Game Types</div>
      </div>
      <div class="stat">
        <div class="stat-value">50+</div>
        <div class="stat-label">Planned</div>
      </div>
      <div class="stat">
        <div class="stat-value">1000+</div>
        <div class="stat-label">Combinations</div>
      </div>
    </div>

    <div class="search-wrapper">
      <input
        type="text"
        id="searchBar"
        class="search-bar"
        placeholder="Search game types..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="filter-tags" id="filterTags"></div>

    <div class="games-grid" id="gamesGrid"></div>

  </div>

</body>
</html>
